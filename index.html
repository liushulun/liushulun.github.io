
<html style="background: #606060;">
    <head>
        <title>Luis's Blog</title>
        <style>
            p {
                text-align: center;
                color: #EB6D39;
                font-size: 1.5em;
                margin-top: 50px;
                border-bottom: none;
            }
            a {
                color: #EB6D39;
                padding-bottom: 2px;
                border-bottom: 1px #EB6D39 solid;
                text-decoration:none;
            }
        </style>
    </head>
    <body>
        <a>asdasd</a>
        <center>
            <img src="./404.png" style="max-width: 100%;">
            <p><a href="https://luis.ltd">点击前往 Luis 的博客（<span id="time">3</span>）</a></p>
        </center>
        <script type="text/javascript">
            function counter() {
                var timeLast = document.getElementById("time").innerHTML;
                if (timeLast <= 0) {
                    document.location.href = "https://luis.ltd";
                } else {
                    timeLast--;
                    document.getElementById("time").innerHTML = timeLast;
                    setInterval(counter, 1000);
                }
            }
            counter();
        </script>
    </body>
</html>
